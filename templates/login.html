{% extends 'layout.html' %}

{% block body %}
<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">

            <!-- HEADER -->
            <div class="text-center py-3" style="background: #000000; color: white; border-radius: 10px 10px 0 0;">
                <h4 class="mb-0">CampusPoint</h4>
            </div>

            <!-- BODY -->
            <div class="p-4">
                <h5 class="text-center mb-4">Log in</h5>

                <form method="POST">

                    <!-- USERNAME -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username"
                               class="form-control"
                               placeholder="Enter your username"
                               value="{{ request.form.username }}">
                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3 position-relative">
                        <label class="form-label">Password</label>
                        <input type="password" name="password"
                               id="password"
                               class="form-control"
                               placeholder="Enter your password">

                    </div>

                    
                    <button type="submit" class="btn w-100"
                            style="background:#000000; color:white;">
                        Log in
                    </button>

                  
                    <div class="text-center mt-3">
                        <a href="#" style="font-size: 14px;">Forgot your password?</a>
                    </div>

                </form>
            </div>

        </div>
    </div>

</div>



{% endblock %}
