{% extends 'layout.html' %}

{% block body %}
<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">

            <!-- HEADER -->
            <div class="text-center py-3" style="background: #0d3b66; color: white; border-radius: 10px 10px 0 0;">
                <h4 class="mb-0">CampusPoint</h4>
            </div>

            <!-- BODY -->
            <div class="p-4">
                <h5 class="text-center mb-4">Log in</h5>

                <form method="POST">

                    <!-- USERNAME -->
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username"
                               class="form-control"
                               placeholder="Enter your username"
                               value="{{ request.form.username }}">
                    </div>

                    <!-- PASSWORD -->
                    <div class="mb-3 position-relative">
                        <label class="form-label">Password</label>
                        <input type="password" name="password"
                               id="password"
                               class="form-control"
                               placeholder="Enter your password">

                        <!-- Toggle icon -->
                        <span onclick="togglePassword()"
                              style="position:absolute; right:10px; top:38px; cursor:pointer;">
                            👁️
                        </span>
                    </div>

                    <!-- LOGIN BUTTON -->
                    <button type="submit" class="btn w-100"
                            style="background:#0d3b66; color:white;">
                        Log in
                    </button>

                    <!-- EXTRA LINKS -->
                    <div class="text-center mt-3">
                        <a href="#" style="font-size: 14px;">Forgot your password?</a>
                    </div>

                </form>
            </div>

        </div>
    </div>

</div>

<!-- SCRIPT -->
<script>
function togglePassword() {
    const pwd = document.getElementById("password");
    pwd.type = pwd.type === "password" ? "text" : "password";
}
</script>

{% endblock %}
